<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trend Hunter Bot — Trade History & Performance">
    <title>Trend Hunter Bot — Trade Log</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body>

<div class="app-container">

    <!-- ═══ Top Navigation ═══ -->
    <nav class="top-nav">
        <div class="nav-brand">
            <div class="nav-logo">🎯</div>
            <div>
                <div class="nav-title">Trend Hunter</div>
                <div class="nav-subtitle">Futures Breakout Bot</div>
            </div>
        </div>

        <div class="nav-links">
            <a href="/" class="nav-link" id="nav-dashboard">📊 Dashboard</a>
            <a href="/settings" class="nav-link" id="nav-settings">⚙️ Settings</a>
            <a href="/trades" class="nav-link active" id="nav-trades">📋 Trades</a>
        </div>

        <div class="nav-status">
            <span id="testnet-badge" class="testnet-badge">TESTNET</span>
        </div>
    </nav>

    <!-- ═══ Page Header ═══ -->
    <div class="section-header">
        <div>
            <h1 class="section-title">Trade History</h1>
            <p class="section-desc">View all executed trades, PnL stats, and export data</p>
        </div>
        <button class="btn btn-outline" onclick="exportCSV()">📥 Export CSV</button>
    </div>

    <!-- ═══ Stats Cards ═══ -->
    <div class="grid-4" style="margin-bottom: var(--space-xl);">
        <div class="card" style="text-align: center;">
            <div id="stat-today-pnl" class="stat-value" style="color: var(--text-bright);">$0.00</div>
            <div class="stat-label">Today's PnL</div>
        </div>
        <div class="card" style="text-align: center;">
            <div id="stat-total-pnl" class="stat-value" style="color: var(--text-bright);">$0.00</div>
            <div class="stat-label">Total PnL</div>
        </div>
        <div class="card" style="text-align: center;">
            <div id="stat-total-trades" class="stat-value">0</div>
            <div class="stat-label">Total Trades</div>
        </div>
        <div class="card" style="text-align: center;">
            <div id="stat-win-rate" class="stat-value">0%</div>
            <div class="stat-label">Win Rate</div>
        </div>
    </div>

    <!-- ═══ Filters ═══ -->
    <div class="filters-bar">
        <select id="filter-symbol" class="filter-input" onchange="loadTrades(1)">
            <option value="">All Assets</option>
            <option value="BTCUSD">BTCUSD</option>
            <option value="ETHUSD">ETHUSD</option>
        </select>
        <input type="date" id="filter-start" class="filter-input" onchange="loadTrades(1)" placeholder="Start Date">
        <input type="date" id="filter-end" class="filter-input" onchange="loadTrades(1)" placeholder="End Date">
        <button class="btn btn-ghost btn-sm" onclick="clearFilters()">Clear Filters</button>
    </div>

    <!-- ═══ Trades Table ═══ -->
    <div class="card" style="padding: 0; overflow: hidden;">
        <div style="overflow-x: auto;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Symbol</th>
                        <th>Direction</th>
                        <th>Entry Price</th>
                        <th>Exit Price</th>
                        <th>Quantity</th>
                        <th>PnL</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="trades-tbody">
                    <tr>
                        <td colspan="8" style="text-align: center; padding: 60px; color: var(--text-muted);">
                            Loading trades...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ═══ Pagination ═══ -->
    <div id="pagination" class="pagination"></div>

</div>

<script src="/static/app.js"></script>
<script>
    function clearFilters() {
        document.getElementById('filter-symbol').value = '';
        document.getElementById('filter-start').value = '';
        document.getElementById('filter-end').value = '';
        loadTrades(1);
    }
</script>
</body>
</html>
